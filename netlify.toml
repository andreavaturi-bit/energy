[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Proxy /api/* to the Netlify Function (cleaner URLs)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA redirect: serve index.html for all routes not matching a file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
